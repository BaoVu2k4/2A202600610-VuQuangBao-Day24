# MedViet AI Agent - Data Access Policy
# Used in Part 6 of the data governance lab notebook.
apiVersion: governance.toolkit/v1
name: medviet-data-policy
default_action: deny

rules:
  - name: allow-read-anonymized
    condition: "action.type == 'read' and action.dataset == 'anonymized'"
    action: allow
    description: "ML engineers may read anonymized training data."

  - name: allow-data-analyst-read-aggregated
    condition: "action.type == 'read' and action.dataset == 'aggregated' and action.agent_role == 'data_analyst'"
    action: allow
    description: "Only data_analyst agents may read aggregated metrics without PII."

  - name: block-raw-pii
    condition: "action.dataset == 'raw_pii'"
    action: deny
    description: "Raw PII access is blocked for autonomous agents."

  - name: block-export-outside-vn
    condition: "action.type == 'export' and action.destination != 'VN'"
    action: deny
    description: "ND13 data localization: no restricted export outside Vietnam."

  - name: require-approval-delete
    condition: "action.type in ['delete', 'drop', 'truncate']"
    action: require_approval
    description: "Destructive data operations require human approval before execution."
